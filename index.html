<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>KoraRate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .match {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .teams {
      font-size: 18px;
    }

    .rating-display {
      color: gold;
      font-size: 18px;
    }

    .stars span {
      font-size: 35px;
      cursor: pointer;
      color: gray;
      transition: 0.2s;
    }

    .stars span.active {
      color: gold;
    }

    .result {
      margin-top: 10px;
      color: #22c55e;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">⚽ KoraRate</div>
  </header>

  <div class="container">

    <div class="card">
      <div class="title">🔥 أفضل مباراة اليوم</div>

      <div class="match">
        <div class="teams">برشلونة vs ريال مدريد</div>
        <div class="rating-display">⭐ 8.5</div>
      </div>

      <p>مباراة قوية ومليئة بالإثارة!</p>
    </div>

    <div class="card">
      <div class="title">⭐ قيّم المباراة</div>

      <div class="stars" id="stars">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
      </div>

      <div class="result" id="result"></div>
    </div>

  </div>

  <footer>
    © 2026 KoraRate
  </footer>

  <script>
    const stars = document.querySelectorAll("#stars span");
    const result = document.getElementById("result");

    // تحميل التقييم من التخزين
    let savedRating = localStorage.getItem("rating");

    if (savedRating) {
      for (let i = 0; i < savedRating; i++) {
        stars[i].classList.add("active");
      }
      result.textContent = "تقييمك: " + savedRating + " ⭐";
    }

    // عند الضغط
    stars.forEach(star => {
      star.addEventListener("click", () => {
        let value = star.getAttribute("data-value");

        stars.forEach(s => s.classList.remove("active"));

        for (let i = 0; i < value; i++) {
          stars[i].classList.add("active");
        }

        // حفظ التقييم
        localStorage.setItem("rating", value);

        result.textContent = "تقييمك: " + value + " ⭐";
      });
    });
  </script>

</body>
</html>
