<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>KoraRate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {padding:15px;text-align:center;background:#020617;font-size:22px;}
.container {padding:20px;}
.card {background:#020617;padding:20px;border-radius:12px;margin-bottom:20px;}
.stars span {font-size:30px;cursor:pointer;color:gray;}
.stars span.active {color:gold;}
.comment {background:#1e293b;padding:8px;margin-top:8px;border-radius:6px;}
textarea {width:100%;margin-top:10px;padding:10px;border-radius:8px;}
button {margin-top:10px;padding:8px;background:#22c55e;border:none;border-radius:6px;}
.avg {color:#38bdf8;margin-top:5px;}
</style>
</head>

<body>

<header>⚽ KoraRate</header>
<div class="container" id="matches"></div>

<script type="module">
import { getAuth, signInWithPopup, GoogleAuthProvider } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  const auth = getAuth();
const provider = new GoogleAuthProvider();

window.login = async function() {
  const result = await signInWithPopup(auth, provider);
  const user = result.user;

  alert("مرحبا " + user.displayName);
};
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQHLKfABXjHlTHPnERDpdXtLa4yLbRVMs",
  authDomain: "korarate-71184.firebaseapp.com",
  projectId: "korarate-71184",
  storageBucket: "korarate-71184.firebasestorage.app",
  messagingSenderId: "924317175958",
  appId: "1:924317175958:web:1e4a53d2e1e9a7f33b32b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
<div style="text-align:center; margin:20px;">
  <button onclick="login()">تسجيل الدخول عبر Google</button>
</div>
// ⚽ مباريات
const matches = [
  { id: 1, name: "برشلونة vs ريال مدريد" },
  { id: 2, name: "بايرن ميونخ vs دورتموند" },
  { id: 3, name: "مانشستر سيتي vs ليفربول" }
];

const container = document.getElementById("matches");

matches.forEach(match => {
  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>${match.name}</h3>

    <div class="stars" id="stars-${match.id}">
      <span data="1">★</span>
      <span data="2">★</span>
      <span data="3">★</span>
      <span data="4">★</span>
      <span data="5">★</span>
    </div>

    <div class="avg" id="avg-${match.id}">تحميل...</div>

    <textarea id="input-${match.id}" placeholder="اكتب تعليقك"></textarea>
    <button onclick="addComment(${match.id})">إرسال</button>

    <div id="comments-${match.id}"></div>
  `;

  container.appendChild(div);

  loadComments(match.id);
  loadRatings(match.id);

  document.querySelectorAll(`#stars-${match.id} span`).forEach(star=>{
    star.onclick = async ()=>{
      let value = Number(star.getAttribute("data"));

      await addDoc(collection(db,"ratings"),{
        matchId: match.id,
        value:value
      });

      loadRatings(match.id);
    }
  });
});

// 💬 تعليقات
window.addComment = async function(id){
  let input = document.getElementById("input-"+id);
  let text = input.value.trim();
  if(!text) return;

  await addDoc(collection(db,"comments"),{
    matchId:id,
    text:text
  });

  input.value="";
  loadComments(id);
}

async function loadComments(id){
  let box=document.getElementById("comments-"+id);
  box.innerHTML="";

  let snap = await getDocs(collection(db,"comments"));
  snap.forEach(doc=>{
    let d=doc.data();
    if(d.matchId==id){
      let div=document.createElement("div");
      div.className="comment";
      div.textContent=d.text;
      box.appendChild(div);
    }
  });
}

// ⭐ تقييم
async function loadRatings(id){
  let snap = await getDocs(collection(db,"ratings"));
  let arr=[];

  snap.forEach(doc=>{
    let d=doc.data();
    if(d.matchId==id){
      arr.push(d.value);
    }
  });

  let avg=0;
  if(arr.length){
    avg=(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1);
  }

  document.getElementById("avg-"+id).textContent =
    "⭐ "+avg+" / 5 ("+arr.length+" تقييم)";
}

</script>

</body>
</html>
